<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Votre Panier</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            padding: 20px;
        }

        #custom-select {
            width: 300px;
        }

        #custom-default {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            border: 2px solid #000;
            padding: 10px;
            border-radius: 35px;
            font-weight: 500
        }

        #custom-options {
            list-style: none;
            list-style-position: inside;
            border: 2px solid #000;
            border-radius: 15px;
            margin-top: 10px;
            display: none;
        }
        
        #custom-option li {
            padding: 10px;
        }

        #custom-options li:hover {
            background: rgba(0,0,0,.1);
        }

        .open{
            display: block !important;
        }
    </style>
</head>


<body>
    <h1>Votre panier</h1>

<div id="custom-select">
    <input type="hidden" value="" id="hiddenInput"> 
    <div id="custom-default">
        Votre selection ...
        <span class="material-icons">expand-more</span>
    </div>

    <ul id="custom-options"> 
        <li data-value="1">Bougie Vanille</li>
        <li data-value="2">Bougie Mangue</li>
        <li data-value="3">Bougie Coco</li>
        <li data-value="4">Bougie Framboise</li>
        <li data-value="5">Bougie Myrtille</li>
        <li data-value="6">Bougie Cerise</li>
        <li data-value="7">Bougie Primevère</li>
        <li data-value="8">Bougie Tulipe</li>
        <li data-value="9">Bougie Crocus</li>
        <li data-value="10">Bougie Myosotis</li>
        <li data-valie="11">Bougie Pensée vivace</li>
        <li data-value="12">Bougie Jacinthe</li>
    </ul>
</div>
</body>
</html>
