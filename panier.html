<!DOCTYPE html> <!--indique le doc-->
<html> <!--debut page HTML-->
<head> <!--contient informations invisibles a la page-->
    <meta charset="utf-8"> <!--defini l'encodage des caracteres-->
    <title>Votre Panier</title> <!--titre de la page-->
    <link rel="stylesheet" href="style.css"> <!--relie le fichier CSS pour le style-->
</head> <!--fin de l'en-tete-->


<body> <!--debut du contenu visible-->
    <div> <!--conteneur de bloc-->
        <ul class="lien-menu"> <!--liste avec un classe CSS-->
            <li> <!--element de la liste-->
                <a href="index.html" class="lien-item">← Retour à la page d'accueil</a> <!--lien vers la page d'accueil-->
            </li> <!--fin de l'element-->
        </ul> <!--fin de la liste-->
    </div> <!--fin du bloc-->

    <h1>Votre panier</h1> <!--titre affiche-->

    <div> <!--nouveau bloc-->
        <button onclick="viderPanier()">Vider le Panier</button> <!--bouton qui appelle la fonction JS pour vider le panier-->
    </div> <!--fin dubloc-->

    <script src="script.js"></script> <!--lie le fichier JavaScript-->
</body> <!--fin du contenu-->
</html> <!--fin du document-->
